input_path: "Data/raw sample/Elier_data_2026-04-30.csv"
output_path: "Data/processed/performance_clean.csv"
loader: performance

standardize_columns: true
lower_case_columns: true
lower_case: true
verbose: true

logging:
  enabled: true
  dir: "Data/processed/logs/raw_cleaning"
  keep_last: 4

date_format: "%Y-%m-%d"

date_filter:
  enabled: true
  column: "YearMonth"
  min_date: "2022-01-01"

include_values_filter:
  enabled: false
  column: "Country Name"
  case_sensitive: false
  values:
    - USA
    - Canada

rename_map:
  "Game_Name": game_name
  "Parent_Supplier": parent_supplier
  "Supplier": supplier
  "Slot_Cabinet_Name": slot_cabinet_name
  "Parent Own Status": parent_own_status
  "Own_Status": own_status
  "Game_Category": game_category
  "Game_Classification": game_classification
  "State": state
  "YearMonth": yearmonth
  "Region Name": region
  "Country Name": country
  "Operator Type": operator_type
  "Parent Game": parent_game
  "Cabinet Type": cabinet_type
  "Game_Release_Date": game_release_date
  "Cabinet_Release_Date": cabinet_release_date

date_cols:
  - yearmonth
  - game_release_date
  - cabinet_release_date

numeric_cols:
  - game_denom
  - game_line_count
  - max_bet
  - avg_days_terminal
  - avg_days_game_theme
  - no_of_slots
  - avg_coin_in_index_vs_house
  - avg_coin_in_index_vs_zone
  - total_avg_theo_net_win_index_vs_house
  - total_avg_theo_net_win_index_vs_zone
  - total_avg_coin_in_index_vs_house
  - total_avg_coin_in_index_vs_zone
  - avg_average_bet
  - casinos
  - avg_games_played_index
  - theo_win_vs_house
  - theo_win_vs_zone
  - average_bet_index_same_denom
  - average_bet_index_same_type_same_denom
  - coin_in_vs_house_same_type
  - theo_win_vs_house_same_type_same_denom
  - utilization_index_same_type_same_denom
  - no_of_casinos
  - avg_theo_net_win_index_vs_house
  - avg_theo_net_win_index_vs_zone
  - casino_count
  - avg_state_casino_count

string_cols:
  - parent_supplier
  - supplier
  - game_name
  - slot_cabinet_name
  - parent_own_status
  - own_status
  - game_category
  - game_classification
  - state
  - country
  - region
  - operator_type
  - parent_game
  - cabinet_type

missing_tokens:
  - "-"
  - "--"
  - ""
  - " "
  - "N/A"
  - "n/a"
  - "NULL"
  - "null"
  - "(Blank)"
  - "#"
  - "unknown"
  - "other"
  - "Not Provided"

typo_maps:
  supplier:
    everi holdings: everi

complementary_columns: {}
drop_complementary_fallbacks: false

supplier_columns:
  - supplier
  - parent_supplier
  - manufacturer

supplier_map:
  scientific games: light & wonder
  sg gaming: light & wonder
  light and wonder: light & wonder
  light&wonder: light & wonder
  aristocrat gaming: aristocrat
  international game technology: igt
  igt gaming: igt
  konami gaming: konami
  ags gaming: ags
  american gaming systems: ags
  everi gaming: everi
  everi holdings: everi

ownership_mapping:
  input_col: own_status
  output_col: own_status
  owned_exact:
    - owned
    - own
    - "y"
    - "yes"
    - "true"
  leased_exact:
    - leased
    - lease
    - "n"
    - "no"
    - "false"
    - not owned
  owned_contains:
    - own
  leased_contains:
    - lease
    - "%"
    - daily
    - per day
    - net win
    - cap

ownership_status_filter:
  enabled: false
  column: own_status
  case_sensitive: false
  values:
    - owned

cabinet_cleaning:
  enabled: true
  column: slot_cabinet_name
  lower_case: true
  artifact_map: {}

cabinet_supplier_map:
  peak curve 49: igt
  peak slant 49: igt
  dimension 49: konami
  dimension 43x3: konami
  dynasty sol: everi
  cosmic: light & wonder

supplier_consistency_validation:
  enabled: false
  strict: true
  cabinet_col: slot_cabinet_name
  game_supplier_col: supplier
  parent_supplier_col: parent_supplier
  report_dir: "Data/processed/reports/performance_supplier_validation"
  external_minimum_share: 0.80
  performance_minimum_share: 0.95
  performance_minimum_rows: 20
  external_sources: []

majority_supplier_per_game:
  enabled: false
  game_col: game_name
  cabinet_col: slot_cabinet_name
  supplier_col: supplier

hierarchical_imputation:
  enabled: true
  numeric_strategy: median
  categorical_strategy: mode
  add_missing_flags: false
  cols:
    - supplier
    - game_release_date
  group_hierarchy:
    - [game_name, slot_cabinet_name]
    - [game_name]
    - [slot_cabinet_name]
    - [state]

canonical_supplier:
  corrected_sales_path:
  original_sales_path:
  output_path: "Data/processed/performance_canonical_suppliers.csv"
  report_dir: "Data/processed/reports/performance_canonical_supplier"
