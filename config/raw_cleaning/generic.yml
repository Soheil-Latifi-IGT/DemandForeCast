shared:
  standardize_columns: true
  lower_case_columns: true
  lower_case: true
  missing_tokens:
    - "-"
    - "--"
    - ""
    - " "
    - "N/A"
    - "n/a"
    - "NULL"
    - "null"
    - "(Blank)"
    - "#"
    - "unknown"
    - "other"
    - "Not Provided"
  supplier_map:
    scientific games: light & wonder
    sg gaming: light & wonder
    light and wonder: light & wonder
    aristocrat gaming: aristocrat
    international game technology: igt
    igt gaming: igt
    everi holdings: everi
    everi gaming: everi

datasets:
  - name: sales
    loader: csv
    input_path: "Data/raw sample/sales.csv"
    output_path: "Data/processed/sales_clean.csv"
    rename_map:
      "Beginning Month Date": data_month
      "Friendly Game Name": game_name
      "Product": cabinet_name
      "3rdParty": supplier
      "Machine Sales, Net": machine_sales_net
    string_cols:
      - game_name
      - cabinet_name
      - supplier
    numeric_cols:
      - machine_sales_net
    date_cols:
      - data_month
    date_format: "%Y-%m-%d"
    supplier_col: supplier
    cabinet_col: cabinet_name
    clean_cabinet_names: true
    cabinet_supplier_map:
      peak curve 49: igt
      dimension 49: konami

  - name: game_attr
    loader: csv
    input_path: "Data/raw sample/game_attr.csv"
    output_path: "Data/processed/game_attr_generic_clean.csv"
    string_cols:
      - theme_name
      - game_type
      - product_segment
      - product_family
      - product_line

  - name: mapping
    loader: csv
    input_path: "Data/raw sample/mapping.csv"
    output_path: "Data/processed/mapping_clean.csv"
    string_cols:
      - theme_name
      - game_type
      - game_sub_type
      - business_segment
      - cabinet_desc
