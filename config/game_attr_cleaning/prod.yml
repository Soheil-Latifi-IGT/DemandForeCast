env: prod
input_path: dbfs:/mnt/demand_forecast/raw/game_attr.csv
write_target: table
output_format: delta
output_table: prod.demand_forecast.game_attr_cleaned
write_mode: overwrite
# Transformation policy. Keep dev/prod aligned unless an environment needs a deliberate difference.
game_matrix_column: game_matrix
explicit_drop_columns:
  - brand_nk
  - brand_name
  - cert_family_ref
  - business_segment
impute_columns:
  - product_segment
  - game_type
  - product_family
  - product_line
impute_groups:
  - theme_name
  - source_company_cd
null_strings:
  - ""
  - "null"
  - "NULL"
  - "Null"
  - "none"
  - "None"
  - "NONE"