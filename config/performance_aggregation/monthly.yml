input_path: "Data/processed/performance_clean.csv"
output_path: "Data/processed/performance_aggregated.csv"
input_format: csv
output_format: csv
engine: auto
write_target: path
write_mode: overwrite
report_dir: "Data/processed/reports/performance_aggregation"

exclude_games:
  enabled: true

group_columns:
  - yearmonth
  - game_name
  - supplier
  - slot_cabinet_name
  - country
  - region
  - operator_type
  - own_status
  - game_category
  - game_classification
  - cabinet_type

weight_column: no_of_slots

sum_columns:
  - no_of_slots
  - casinos
  - no_of_casinos
  - casino_count

weighted_average_columns:
  - game_denom
  - game_line_count
  - max_bet
  - avg_days_terminal
  - avg_days_game_theme
  - avg_coin_in_index_vs_house
  - avg_coin_in_index_vs_zone
  - total_avg_theo_net_win_index_vs_house
  - total_avg_theo_net_win_index_vs_zone
  - total_avg_coin_in_index_vs_house
  - total_avg_coin_in_index_vs_zone
  - avg_average_bet
  - avg_games_played_index
  - theo_win_vs_house
  - theo_win_vs_zone
  - average_bet_index_same_denom
  - average_bet_index_same_type_same_denom
  - coin_in_vs_house_same_type
  - theo_win_vs_house_same_type_same_denom
  - utilization_index_same_type_same_denom
  - avg_theo_net_win_index_vs_house
  - avg_theo_net_win_index_vs_zone
  - avg_state_casino_count

first_columns:
  - parent_supplier
  - parent_own_status
  - parent_game
  - game_release_date
  - cabinet_release_date

nunique_columns:
  - state
