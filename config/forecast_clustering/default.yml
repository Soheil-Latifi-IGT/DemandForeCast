input_path: "Data/processed/forecast_joined_clean.csv"
input_format: csv
output_format: csv
profiles_output_path: "Data/processed/forecast_game_profiles.csv"
feature_matrix_output_path: "Data/processed/forecast_clustering_features.csv"
like_games_output_path: "Data/processed/forecast_like_games.csv"
dendrogram_output_path: "Data/processed/reports/forecast_clustering/dendrogram.png"
report_dir: "Data/processed/reports/forecast_clustering"

id_columns:
  - theme_key
  - game_name
  - mapping_cabinet_desc

month_column: yearmonth
release_date_column: game_release_date

target_selection:
  start: "2025-01-01"
  end: "2025-12-31"
  fallback_to_latest: true

history_gate:
  min_months: 6

clustering:
  method: complete
  metric: euclidean

outputs:
  max_like_games_per_target: 5

dendrogram:
  max_leaf_count: 60
  label_columns:
    - game_name
    - mapping_cabinet_desc
    - theme_key
  figsize:
    - 18
    - 10
  dpi: 160

features:
  categorical:
    - supplier
    - mapping_cabinet_desc
    - game_category
    - game_classification
    - cabinet_type
    - own_status
    - sales_first_business_segment
    - sales_first_game_matrix
    - sales_first_copa_product_type
    - sales_first_copa_product_technology
    - sales_first_copa_product_style
    - sales_first_copa_product_series
    - attr_product_family
    - attr_game_type
    - attr_product_segment
    - attr_product_line
  numeric:
    - sales_rows
    - sales_machine_sales_net
    - sales_machine_gross_margin
    - no_of_slots
    - performance_rows
    - state_count
    - avg_coin_in_index_vs_house
    - avg_theo_net_win_index_vs_house
    - avg_average_bet
  weights:
    mapping_cabinet_desc: 1.3
    sales_first_business_segment: 1.4
    sales_first_game_matrix: 1.4
    sales_first_copa_product_type: 1.1
    sales_first_copa_product_technology: 1.1
    avg_coin_in_index_vs_house: 1.0
    avg_theo_net_win_index_vs_house: 1.0
